{% extends "base.html" %}
{% block title %}Connexion — WatchFolio{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 2rem;
  }

  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
  }

  .auth-icon {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .auth-w {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    background: var(--gold-lt);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--gold);
  }

  .auth-title {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }

  .auth-sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }

  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: var(--muted);
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-icon">
      <span class="auth-w">W</span>
    </div>
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-sub">Accédez à votre collection</p>

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      {{ csrf_token() if csrf_token is defined else '' }}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="email">Adresse e-mail</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          value="{{ email or '' }}"
          placeholder="vous@exemple.fr"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-gold" style="width:100%; justify-content:center; padding:0.75rem;">
        Se connecter
      </button>
    </form>

    <div class="auth-footer">
      Pas encore de compte ?
      <a href="{{ url_for('register') }}">Créer un compte gratuit</a>
    </div>
  </div>
</div>
{% endblock %}
